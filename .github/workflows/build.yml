name: Build Yggdroid AAR

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'  # Запускать при создании тегов вида v1.0.0
  workflow_dispatch:  # Возможность запуска вручную

jobs:
  build:
    name: Build AAR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.1" "ndk;23.2.8568313"
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace
      
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdroid-core
          path: app/build/outputs/aar/*.aar
          retention-days: 30  # Хранить артефакты 30 дней [citation:3]
