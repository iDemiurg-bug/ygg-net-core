name: Build Yggdroid AAR

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build AAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          # Устанавливаем SDK Manager вручную и используем полный путь
          export ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_HOME"

          # Скачиваем command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip

          # Создаём правильную структуру папок
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          rm -rf cmdline-tools commandlinetools-linux-*.zip

          # Определяем переменную с полным путём к sdkmanager
          SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager

          # Проверяем, что файл действительно существует
          if [ ! -f "$SDKMANAGER" ]; then
            echo "❌ sdkmanager not found at $SDKMANAGER"
            exit 1
          fi
          echo "✅ sdkmanager found at $SDKMANAGER"

          # Принимаем лицензии, используя полный путь
          yes | $SDKMANAGER --licenses > /dev/null 2>&1

          # Устанавливаем компоненты, используя полный путь
          $SDKMANAGER "platform-tools" "platforms;android-33" "build-tools;33.0.1" "ndk;23.2.8568313" > /dev/null

          # Добавляем platform-tools в PATH (полезно для Gradle)
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.jvmargs="-Xmx2048m -XX:+UseParallelGC"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdroid-core
          path: app/build/outputs/aar/*.aar
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/
            **/*.log
          retention-days: 7
